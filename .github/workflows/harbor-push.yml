name: Build and Push to Harbor

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g. v2.0.0, 2026-04-07)'
        required: true
        default: 'v2.0.0'

env:
  HARBOR_REGISTRY: harborpush.suanleme.cn
  IMAGE_NAME: aistoy/indextts2

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
